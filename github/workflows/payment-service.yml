name: payment-service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "services/payment-service/**"
      - ".github/workflows/payment-service.yml"
      - ".github/workflows/_reusable-build.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/payment-service/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
          - development

jobs:
  test:
    name: Test payment-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/payment-service/package-lock.json

      - name: Install dependencies
        working-directory: services/payment-service
        run: npm ci

      - name: Run tests
        working-directory: services/payment-service
        run: npm test --if-present

      - name: Run lint
        working-directory: services/payment-service
        run: npm run lint --if-present

  build-and-push:
    name: Build & Push payment-service
    needs: test
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/_reusable-build.yml
    with:
      service_name: payment-service
      service_path: services/payment-service
      ecr_repository: payment-service
      aws_region: us-east-1
      environment: ${{ github.event.inputs.environment || 'production' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
