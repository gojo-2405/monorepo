name: Deploy All Services

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
          - development
      services:
        description: "Comma-separated list of services to deploy (leave empty for all)"
        required: false
        default: ""
        type: string

jobs:
  resolve-services:
    name: Resolve services to deploy
    runs-on: ubuntu-latest
    outputs:
      deploy_auth: ${{ steps.resolve.outputs.deploy_auth }}
      deploy_user: ${{ steps.resolve.outputs.deploy_user }}
      deploy_product: ${{ steps.resolve.outputs.deploy_product }}
      deploy_order: ${{ steps.resolve.outputs.deploy_order }}
      deploy_payment: ${{ steps.resolve.outputs.deploy_payment }}
      deploy_notification: ${{ steps.resolve.outputs.deploy_notification }}
      deploy_gateway: ${{ steps.resolve.outputs.deploy_gateway }}
      deploy_reporting: ${{ steps.resolve.outputs.deploy_reporting }}
    steps:
      - id: resolve
        run: |
          INPUT="${{ github.event.inputs.services }}"
          if [ -z "$INPUT" ]; then
            # Deploy all if none specified
            echo "deploy_auth=true" >> $GITHUB_OUTPUT
            echo "deploy_user=true" >> $GITHUB_OUTPUT
            echo "deploy_product=true" >> $GITHUB_OUTPUT
            echo "deploy_order=true" >> $GITHUB_OUTPUT
            echo "deploy_payment=true" >> $GITHUB_OUTPUT
            echo "deploy_notification=true" >> $GITHUB_OUTPUT
            echo "deploy_gateway=true" >> $GITHUB_OUTPUT
            echo "deploy_reporting=true" >> $GITHUB_OUTPUT
          else
            echo "deploy_auth=$(echo $INPUT | grep -c auth-service || echo false)" >> $GITHUB_OUTPUT
            echo "deploy_user=$(echo $INPUT | grep -c user-service || echo false)" >> $GITHUB_OUTPUT
            echo "deploy_product=$(echo $INPUT | grep -c product-service || echo false)" >> $GITHUB_OUTPUT
            echo "deploy_order=$(echo $INPUT | grep -c order-service || echo false)" >> $GITHUB_OUTPUT
            echo "deploy_payment=$(echo $INPUT | grep -c payment-service || echo false)" >> $GITHUB_OUTPUT
            echo "deploy_notification=$(echo $INPUT | grep -c notification-service || echo false)" >> $GITHUB_OUTPUT
            echo "deploy_gateway=$(echo $INPUT | grep -c api-gateway || echo false)" >> $GITHUB_OUTPUT
            echo "deploy_reporting=$(echo $INPUT | grep -c reporting-service || echo false)" >> $GITHUB_OUTPUT
          fi

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    name: auth-service
    needs: resolve-services
    if: needs.resolve-services.outputs.deploy_auth == 'true' || needs.resolve-services.outputs.deploy_auth == '1'
    uses: ./.github/workflows/_reusable-build.yml
    with:
      service_name: auth-service
      service_path: services/auth-service
      ecr_repository: auth-service
      aws_region: us-east-1
      environment: ${{ github.event.inputs.environment }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

  # ── User Service ─────────────────────────────────────────────────────────────
  user-service:
    name: user-service
    needs: resolve-services
    if: needs.resolve-services.outputs.deploy_user == 'true' || needs.resolve-services.outputs.deploy_user == '1'
    uses: ./.github/workflows/_reusable-build.yml
    with:
      service_name: user-service
      service_path: services/user-service
      ecr_repository: user-service
      aws_region: us-east-1
      environment: ${{ github.event.inputs.environment }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

  # ── Product Service ───────────────────────────────────────────────────────────
  product-service:
    name: product-service
    needs: resolve-services
    if: needs.resolve-services.outputs.deploy_product == 'true' || needs.resolve-services.outputs.deploy_product == '1'
    uses: ./.github/workflows/_reusable-build.yml
    with:
      service_name: product-service
      service_path: services/product-service
      ecr_repository: product-service
      aws_region: us-east-1
      environment: ${{ github.event.inputs.environment }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

  # ── Order Service ─────────────────────────────────────────────────────────────
  order-service:
    name: order-service
    needs: resolve-services
    if: needs.resolve-services.outputs.deploy_order == 'true' || needs.resolve-services.outputs.deploy_order == '1'
    uses: ./.github/workflows/_reusable-build.yml
    with:
      service_name: order-service
      service_path: services/order-service
      ecr_repository: order-service
      aws_region: us-east-1
      environment: ${{ github.event.inputs.environment }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

  # ── Payment Service ───────────────────────────────────────────────────────────
  payment-service:
    name: payment-service
    needs: resolve-services
    if: needs.resolve-services.outputs.deploy_payment == 'true' || needs.resolve-services.outputs.deploy_payment == '1'
    uses: ./.github/workflows/_reusable-build.yml
    with:
      service_name: payment-service
      service_path: services/payment-service
      ecr_repository: payment-service
      aws_region: us-east-1
      environment: ${{ github.event.inputs.environment }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

  # ── Notification Service ──────────────────────────────────────────────────────
  notification-service:
    name: notification-service
    needs: resolve-services
    if: needs.resolve-services.outputs.deploy_notification == 'true' || needs.resolve-services.outputs.deploy_notification == '1'
    uses: ./.github/workflows/_reusable-build.yml
    with:
      service_name: notification-service
      service_path: services/notification-service
      ecr_repository: notification-service
      aws_region: us-east-1
      environment: ${{ github.event.inputs.environment }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

  # ── API Gateway ───────────────────────────────────────────────────────────────
  api-gateway:
    name: api-gateway
    needs: resolve-services
    if: needs.resolve-services.outputs.deploy_gateway == 'true' || needs.resolve-services.outputs.deploy_gateway == '1'
    uses: ./.github/workflows/_reusable-build.yml
    with:
      service_name: api-gateway
      service_path: services/api-gateway
      ecr_repository: api-gateway
      aws_region: us-east-1
      environment: ${{ github.event.inputs.environment }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

  # ── Reporting Service ─────────────────────────────────────────────────────────
  reporting-service:
    name: reporting-service
    needs: resolve-services
    if: needs.resolve-services.outputs.deploy_reporting == 'true' || needs.resolve-services.outputs.deploy_reporting == '1'
    uses: ./.github/workflows/_reusable-build.yml
    with:
      service_name: reporting-service
      service_path: services/reporting-service
      ecr_repository: reporting-service
      aws_region: us-east-1
      environment: ${{ github.event.inputs.environment }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

  # ── Summary ───────────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - auth-service
      - user-service
      - product-service
      - order-service
      - payment-service
      - notification-service
      - api-gateway
      - reporting-service
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 🚀 Deploy All Services — Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| auth-service | ${{ needs.auth-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| user-service | ${{ needs.user-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| product-service | ${{ needs.product-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| order-service | ${{ needs.order-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| payment-service | ${{ needs.payment-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| notification-service | ${{ needs.notification-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| api-gateway | ${{ needs.api-gateway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| reporting-service | ${{ needs.reporting-service.result }} |" >> $GITHUB_STEP_SUMMARY
