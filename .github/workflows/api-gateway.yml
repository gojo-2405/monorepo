name: api-gateway CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "services/api-gateway/**"
      - ".github/workflows/api-gateway.yml"
      - ".github/workflows/_reusable-build.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/api-gateway/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
          - development

jobs:
  test:
    name: Test api-gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/api-gateway/package-lock.json

      - name: Install dependencies
        working-directory: services/api-gateway
        run: npm ci

      - name: Run tests
        working-directory: services/api-gateway
        run: npm test --if-present

      - name: Run lint
        working-directory: services/api-gateway
        run: npm run lint --if-present

  build-and-push:
    name: Build & Push api-gateway
    needs: test
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/_reusable-build.yml
    with:
      service_name: api-gateway
      service_path: services/api-gateway
      ecr_repository: api-gateway
      aws_region: us-east-1
      environment: ${{ github.event.inputs.environment || 'production' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
